  <!-- FOUC guard: apply persisted theme bg before paint -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('terminal_theme');
        var darkMatch = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!t) t = darkMatch ? 'dracula' : 'dracula-light';
        var bgs = {
          'dracula': '#282a36', 'dracula-light': '#f8f8f2',
          'monokai': '#272822', 'monokai-light': '#fafafa'
        };
        var bg = bgs[t] || '#282a36';
        var isLight = t.endsWith('-light');
        var fg = isLight ? '#282a36' : '#f8f8f2';
        document.documentElement.style.setProperty('--term-bg', bg);
        document.documentElement.style.setProperty('--term-fg', fg);
        document.documentElement.setAttribute('data-theme-mode', isLight ? 'light' : 'dark');
      } catch (e) { /* ignore */ }
    })();
  </script>
