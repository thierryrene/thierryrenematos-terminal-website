  <style>
    /* ── Theme Custom Properties ── */
    :root {
      /* Dracula (default) */
      --term-bg:      #282a36;
      --term-surface: #21222c;
      --term-border:  #44475a;
      --term-fg:      #f8f8f2;
      --term-comment: #6272a4;
      --term-green:   #50fa7b;
      --term-yellow:  #f1fa8c;
      --term-blue:    #8be9fd;
      --term-purple:  #bd93f9;
      --term-cyan:    #8be9fd;
      --term-red:     #ff5555;
      --term-orange:  #ffb86c;
      --term-pink:    #ff79c6;
    }

    /* ── Base reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--term-bg);
      color: var(--term-fg);
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      overflow: hidden;
    }

    /* ── CRT Scanlines overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
    }

    /* ── CRT Screen flicker ── */
    @keyframes crt-flicker {
      0%   { opacity: 1; }
      92%  { opacity: 1; }
      93%  { opacity: 0.94; }
      94%  { opacity: 1; }
      97%  { opacity: 0.96; }
      100% { opacity: 1; }
    }

    /* ── Phosphor glow ── */
    @keyframes phosphor-pulse {
      0%, 100% { text-shadow: 0 0 4px var(--term-green), 0 0 8px rgba(80,250,123,0.3); }
      50%       { text-shadow: 0 0 6px var(--term-green), 0 0 14px rgba(80,250,123,0.5); }
    }

    /* ── Cursor blink ── */
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Terminal window ── */
    terminal-window {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: var(--term-bg);
      animation: crt-flicker 8s infinite;
    }

    /* ── Title bar ── */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--term-surface);
      border-bottom: 1px solid var(--term-border);
      flex-shrink: 0;
      user-select: none;
    }

    .titlebar-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .titlebar-title {
      margin-left: 8px;
      font-size: 0.75rem;
      color: var(--term-comment);
      flex: 1;
      text-align: center;
    }

    /* ── Output area ── */
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scroll-behavior: smooth;
    }

    .output-area::-webkit-scrollbar { width: 6px; }
    .output-area::-webkit-scrollbar-track { background: var(--term-surface); }
    .output-area::-webkit-scrollbar-thumb { background: var(--term-border); border-radius: 3px; }

    /* ── Output lines ── */
    .output-line {
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-line.glow {
      animation: phosphor-pulse 3s ease-in-out infinite;
    }

    /* ── Color helpers ── */
    .c-fg      { color: var(--term-fg); }
    .c-green   { color: var(--term-green); }
    .c-yellow  { color: var(--term-yellow); }
    .c-blue    { color: var(--term-blue); }
    .c-purple  { color: var(--term-purple); }
    .c-cyan    { color: var(--term-cyan); }
    .c-red     { color: var(--term-red); }
    .c-orange  { color: var(--term-orange); }
    .c-pink    { color: var(--term-pink); }
    .c-comment { color: var(--term-comment); }
    .c-bold    { font-weight: 700; }
    .c-dim     { opacity: 0.6; }

    /* ── Prompt area ── */
    terminal-prompt {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 8px 16px 12px;
      flex-shrink: 0;
      border-top: 1px solid var(--term-border);
      background: var(--term-bg);
    }

    .prompt-label {
      white-space: nowrap;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--term-fg);
      font-family: inherit;
      font-size: 0.875rem;
      caret-color: var(--term-green);
      padding: 0 4px;
    }

    .prompt-cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--term-green);
      vertical-align: text-bottom;
      animation: cursor-blink 1s step-end infinite;
      flex-shrink: 0;
    }

    /* ── Responsive: mobile adjustments ── */
    @media (max-width: 640px) {
      .output-area { padding: 10px; }
      .output-line { font-size: 0.8rem; }
      terminal-prompt { padding: 6px 10px 10px; }
      .prompt-label, .prompt-input { font-size: 0.8rem; }
    }

    /* ── ASCII art container ── */
    .ascii-art {
      font-size: 0.65rem;
      line-height: 1.1;
      color: var(--term-purple);
      text-shadow: 0 0 8px var(--term-purple);
    }

    @media (max-width: 640px) {
      .ascii-art { font-size: 0.5rem; }
    }

    /* ── Separator ── */
    .separator {
      color: var(--term-border);
    }

    /* ── Link styling ── */
    a.term-link {
      color: var(--term-cyan);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    a.term-link:hover, a.term-link:focus {
      color: var(--term-blue);
      outline: 1px dashed var(--term-blue);
      outline-offset: 2px;
    }

    /* ── Tag badges ── */
    .tag {
      display: inline-block;
      padding: 0 6px;
      border: 1px solid var(--term-border);
      border-radius: 3px;
      font-size: 0.7rem;
      color: var(--term-comment);
      margin: 1px 2px;
    }

    /* ── Autocomplete suggestions ── */
    #autocomplete-list {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      background: var(--term-surface);
      border: 1px solid var(--term-border);
      border-radius: 4px;
      padding: 4px 0;
      z-index: 100;
      min-width: 180px;
    }

    #autocomplete-list.visible { display: block; }

    .autocomplete-item {
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--term-fg);
    }
    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: var(--term-border);
      color: var(--term-green);
    }

    /* ── Prompt wrapper for autocomplete positioning ── */
    .prompt-inner {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
    }
  </style>
</head>

/* ═══════════════════════════════════════════════════
   2. STATE MACHINE (Proxy API)
   ═══════════════════════════════════════════════════ */

const _state = {
  theme:       'dracula',
  history:     [],
  historyIdx:  -1,
  inputBuffer: '',
  booted:      false,
  acSuggestions: [],
  acActiveIdx: -1,
};

const state = new Proxy(_state, {
  set(target, prop, value) {
    const prev = target[prop];
    target[prop] = value;
    if (prev !== value) {
      document.dispatchEvent(new CustomEvent('state:change', {
        detail: { prop, value, prev },
      }));
    }
    return true;
  },
});

/* ═══════════════════════════════════════════════════
   3. TEMPLATE HELPERS
   ═══════════════════════════════════════════════════ */

/**
 * Clones a <template> by id and returns the DocumentFragment.
 * @param {string} id
 * @returns {DocumentFragment}
 */
function cloneTemplate(id) {
  return document.getElementById(id).content.cloneNode(true);
}

/**
 * Creates a single line element with given text and CSS classes.
 * @param {string} text
 * @param {...string} classes
 * @returns {HTMLElement}
 */
function makeLine(text, ...classes) {
  const frag = cloneTemplate('tpl-line');
  const el = frag.querySelector('.output-line');
  el.textContent = text;
  if (classes.length) el.classList.add(...classes);
  return frag;
}

/**
 * Creates a line with mixed content via a builder function.
 * @param {function(HTMLElement): void} builder
 * @param {...string} classes
 * @returns {DocumentFragment}
 */
function makeLineWith(builder, ...classes) {
  const frag = cloneTemplate('tpl-line');
  const el = frag.querySelector('.output-line');
  if (classes.length) el.classList.add(...classes);
  builder(el);
  return frag;
}

function makeBlank() {
  return cloneTemplate('tpl-blank');
}

function makeSeparator(char = '─', length = 60) {
  const frag = cloneTemplate('tpl-separator');
  frag.querySelector('.separator').textContent = char.repeat(length);
  return frag;
}

/* ═══════════════════════════════════════════════════
   4. OUTPUT ENGINE
   ═══════════════════════════════════════════════════ */

const output = document.getElementById('output');

/**
 * Appends one or more nodes/fragments to the output area and scrolls down.
 * @param {...(Node|DocumentFragment)} nodes
 */
function print(...nodes) {
  for (const node of nodes) {
    output.appendChild(node);
  }
  output.scrollTop = output.scrollHeight;
}

/* ═══════════════════════════════════════════════════
   6. THEME ENGINE
   ═══════════════════════════════════════════════════ */

/**
 * Applies a theme by updating CSS custom properties.
 * @param {string} name
 */
function applyTheme(name) {
  const t = themes[name];
  if (!t) return;
  const root = document.documentElement;
  for (const [prop, val] of Object.entries(t)) {
    root.style.setProperty(prop, val);
  }
}

/* ═══════════════════════════════════════════════════
   7. COMMAND PARSER & EXECUTOR
   ═══════════════════════════════════════════════════ */

/**
 * Echoes the command the user typed back to the output.
 * @param {string} raw
 */
function echoInput(raw) {
  print(makeLineWith(el => {
    const promptEl = document.createElement('span');
    promptEl.className = 'c-comment';
    promptEl.textContent = '$ ';
    const cmdEl = document.createElement('span');
    cmdEl.className = 'c-fg';
    cmdEl.textContent = raw;
    el.appendChild(promptEl);
    el.appendChild(cmdEl);
  }));
}

/**
 * Parses and executes a command string.
 * @param {string} raw
 */
function execute(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  // Add to history
  if (state.history[0] !== trimmed) {
    state.history = [trimmed, ...state.history].slice(0, 100);
  }
  state.historyIdx = -1;

  echoInput(trimmed);

  const [cmd, ...args] = trimmed.toLowerCase().split(/\s+/);
  const handler = COMMANDS[cmd];

  if (handler) {
    handler(args);
  } else {
    print(
      makeBlank(),
      makeLineWith(el => {
        const errEl = document.createElement('span');
        errEl.className = 'c-red';
        errEl.textContent = `Comando não encontrado: "${cmd}"`;
        el.appendChild(errEl);
        const hintEl = document.createElement('span');
        hintEl.className = 'c-comment';
        hintEl.textContent = '  — Digite "help" para ver os comandos disponíveis.';
        el.appendChild(hintEl);
      }),
      makeBlank(),
    );
  }
}

/* ═══════════════════════════════════════════════════
   9. AUTOCOMPLETE ENGINE
   ═══════════════════════════════════════════════════ */

const acList = document.getElementById('autocomplete-list');
const ALL_COMMANDS = Object.keys(COMMANDS);

function updateAutocomplete(value) {
  const query = value.trim().toLowerCase();
  acList.innerHTML = '';

  if (!query) {
    state.acSuggestions = [];
    state.acActiveIdx = -1;
    acList.classList.remove('visible');
    return;
  }

  const matches = ALL_COMMANDS.filter(c => c.startsWith(query) && c !== query);

  if (!matches.length) {
    state.acSuggestions = [];
    state.acActiveIdx = -1;
    acList.classList.remove('visible');
    return;
  }

  state.acSuggestions = matches;
  state.acActiveIdx = -1;

  for (const match of matches) {
    const frag = cloneTemplate('tpl-autocomplete-item');
    const item = frag.querySelector('.autocomplete-item');
    item.textContent = match;
    item.dataset.cmd = match;
    item.addEventListener('click', () => {
      input.value = match;
      acList.classList.remove('visible');
      state.acSuggestions = [];
      input.focus();
    });
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter') item.click();
    });
    acList.appendChild(item);
  }

  acList.classList.add('visible');
}

function setAcActive(idx) {
  const items = acList.querySelectorAll('.autocomplete-item');
  items.forEach(el => el.classList.remove('active'));
  if (idx >= 0 && idx < items.length) {
    items[idx].classList.add('active');
    items[idx].setAttribute('aria-selected', 'true');
  }
}

/* ═══════════════════════════════════════════════════
   10. INPUT HANDLER
   ═══════════════════════════════════════════════════ */

const input = document.getElementById('cmd-input');

input.addEventListener('input', () => {
  updateAutocomplete(input.value);
});

input.addEventListener('keydown', e => {
  const suggestions = state.acSuggestions;

  switch (e.key) {
    case 'Enter': {
      e.preventDefault();
      acList.classList.remove('visible');
      state.acSuggestions = [];
      const val = input.value;
      input.value = '';
      updateAutocomplete('');
      execute(val);
      break;
    }

    case 'Tab': {
      e.preventDefault();
      if (suggestions.length === 1) {
        input.value = suggestions[0];
        updateAutocomplete('');
      } else if (suggestions.length > 1) {
        let next = (state.acActiveIdx + 1) % suggestions.length;
        state.acActiveIdx = next;
        setAcActive(next);
        input.value = suggestions[next];
      }
      break;
    }

    case 'ArrowUp': {
      e.preventDefault();
      // If autocomplete open, navigate it
      if (acList.classList.contains('visible') && suggestions.length) {
        let prev = state.acActiveIdx <= 0 ? suggestions.length - 1 : state.acActiveIdx - 1;
        state.acActiveIdx = prev;
        setAcActive(prev);
        input.value = suggestions[prev];
      } else {
        // History navigation
        const hist = state.history;
        if (!hist.length) break;
        if (state.historyIdx === -1) state.inputBuffer = input.value;
        const next = Math.min(state.historyIdx + 1, hist.length - 1);
        state.historyIdx = next;
        input.value = hist[next];
        // Move cursor to end
        requestAnimationFrame(() => {
          input.selectionStart = input.selectionEnd = input.value.length;
        });
      }
      break;
    }

    case 'ArrowDown': {
      e.preventDefault();
      if (acList.classList.contains('visible') && suggestions.length) {
        let next = (state.acActiveIdx + 1) % suggestions.length;
        state.acActiveIdx = next;
        setAcActive(next);
        input.value = suggestions[next];
      } else {
        const hist = state.history;
        if (state.historyIdx <= 0) {
          state.historyIdx = -1;
          input.value = state.inputBuffer;
        } else {
          const prev = state.historyIdx - 1;
          state.historyIdx = prev;
          input.value = hist[prev];
        }
      }
      break;
    }

    case 'Escape': {
      acList.classList.remove('visible');
      state.acSuggestions = [];
      state.acActiveIdx = -1;
      break;
    }

    case 'l': {
      if (e.ctrlKey) {
        e.preventDefault();
        COMMANDS.clear();
      }
      break;
    }

    case 'c': {
      if (e.ctrlKey) {
        e.preventDefault();
        print(makeLineWith(el => {
          el.textContent = '$ ' + input.value + '^C';
          el.classList.add('c-comment');
        }));
        input.value = '';
        updateAutocomplete('');
        state.historyIdx = -1;
      }
      break;
    }

    case 'u': {
      if (e.ctrlKey) {
        e.preventDefault();
        input.value = '';
        updateAutocomplete('');
      }
      break;
    }
  }
});

/* ═══════════════════════════════════════════════════
   11. FOCUS MANAGEMENT
   ═══════════════════════════════════════════════════ */

// Re-focus input when clicking anywhere on the terminal window
document.querySelector('terminal-window').addEventListener('click', e => {
  if (e.target !== input && !e.target.closest('a') && !e.target.closest('.autocomplete-item')) {
    input.focus();
  }
});

// Close autocomplete when clicking outside
document.addEventListener('click', e => {
  if (!acList.contains(e.target) && e.target !== input) {
    acList.classList.remove('visible');
    state.acSuggestions = [];
  }
});

/* ═══════════════════════════════════════════════════
   12. CUSTOM ELEMENTS
   ═══════════════════════════════════════════════════ */

class TerminalWindow extends HTMLElement {
  connectedCallback() {
    // Light DOM: Tailwind and global CSS apply directly
    this.setAttribute('tabindex', '-1');
  }
}

class TerminalPrompt extends HTMLElement {
  connectedCallback() {
    // Delegate keyboard events via the global input handler
  }
}

customElements.define('terminal-window', TerminalWindow);
customElements.define('terminal-prompt', TerminalPrompt);

/* ═══════════════════════════════════════════════════
   13. STATE CHANGE LISTENER
   ═══════════════════════════════════════════════════ */

document.addEventListener('state:change', e => {
  const { prop, value } = e.detail;
  if (prop === 'theme') {
    applyTheme(value);
    document.querySelector('.titlebar-title').textContent =
      `thierry@thierryrenematos.tec.br — zsh — tema: ${value}`;
  }
});

/* ═══════════════════════════════════════════════════
   14. BOOT
   ═══════════════════════════════════════════════════ */

function boot() {
  applyTheme(state.theme);
  printBanner();

  // Delay first prompt to simulate terminal boot feel
  setTimeout(() => {
    input.focus();
    state.booted = true;
  }, 150);
}

// DOMContentLoaded is already fired (script is deferred by position), boot now
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
