<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Portfolio - Thierry Rene Matos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            term: {
              bg: 'var(--term-bg)',
              fg: 'var(--term-fg)',
              green: 'var(--term-green)',
              blue: 'var(--term-blue)',
              purple: 'var(--term-purple)',
              yellow: 'var(--term-yellow)'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  
  <!-- GA4 Placeholder -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body class="flex items-center justify-center min-h-screen p-0 sm:p-8 bg-gradient-to-br from-slate-900 to-black">

  <!-- macOS Style Window Wrapper -->
  <div class="mac-window w-full h-[100dvh] sm:w-[75vw] sm:max-w-7xl sm:h-[85vh] flex flex-col bg-gray-900 rounded-none sm:rounded-xl overflow-hidden relative">
    
    <!-- Window Header -->
    <div class="h-10 bg-slate-800 flex items-center px-4 shrink-0 z-10 border-b border-white/5 relative">
      <div class="flex space-x-2 absolute left-4">
        <div class="w-3 h-3 rounded-full bg-red-500 border border-red-600"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500 border border-yellow-600"></div>
        <div class="w-3 h-3 rounded-full bg-green-500 border border-green-600"></div>
      </div>
      <div class="flex-1 text-center font-mono text-xs text-slate-400">thierry@ubuntu-server:~</div>
    </div>
    
    <!-- Terminal Root Component -->
    <terminal-window class="flex-1 relative flex flex-col bg-term-bg text-term-fg term-font text-sm sm:text-base glow overflow-hidden">
      
      <!-- Output Container -->
      <terminal-output id="output" class="flex-1 overflow-y-auto p-4 pb-2 scroll-smooth block" aria-live="polite" aria-relevant="additions text"></terminal-output>
      
      <!-- Prompt Component -->
      <terminal-prompt class="px-4 pb-16 pt-2 flex items-center shrink-0 block">
        <span class="prompt-user text-term-green whitespace-nowrap font-bold">thierry@ubuntu-server:~$ </span>
        <div class="relative flex-1 ml-2 flex items-center">
          <span id="ghost-text" class="absolute pointer-events-none opacity-50 text-gray-500 whitespace-pre"></span>
          <input type="text" id="cmd-input" class="w-full bg-transparent border-none outline-none text-term-fg caret-term-purple z-10 font-bold" autocomplete="off" spellcheck="false" title="Comando">
        </div>
      </terminal-prompt>

      <!-- Quick Actions / Toolbar -->
      <quick-actions id="quick-actions" class="absolute bottom-0 left-0 right-0 h-12 bg-black/40 backdrop-blur px-4 flex items-center gap-2 overflow-x-auto z-20 border-t border-white/5 block">
        <!-- Buttons injected dynamically -->
      </quick-actions>
      
    </terminal-window>
  </div>

  <!-- HTML TEMPLATES -->
  
  <template id="tpl-cmds">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-2 w-full my-2 slide-in"></div>
  </template>

  <template id="tpl-neofetch">
    <div class="flex flex-col md:flex-row items-center md:items-start gap-6 my-4 slide-in w-full">
      <pre class="whitespace-pre leading-none font-mono font-bold text-term-green text-[10px] sm:text-xs logo-art"></pre>
      <div class="flex-1 w-full">
        <div class="grid grid-cols-[120px_1fr] gap-x-2 gap-y-1 text-sm host-data mb-4"></div>
        <div class="flex shrink-0 w-full color-blocks">
           <div class="w-6 h-6 bg-black"></div><div class="w-6 h-6 bg-red-500"></div>
           <div class="w-6 h-6 bg-green-500"></div><div class="w-6 h-6 bg-yellow-500"></div>
           <div class="w-6 h-6 bg-blue-500"></div><div class="w-6 h-6 bg-purple-500"></div>
           <div class="w-6 h-6 bg-cyan-500"></div><div class="w-6 h-6 bg-white"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-ls">
    <div class="flex flex-wrap gap-4 my-2 slide-in"></div>
  </template>

  <template id="tpl-experience">
    <div class="my-4 space-y-6 experience-container slide-in"></div>
  </template>

  <template id="tpl-projects">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-4 projects-container slide-in"></div>
  </template>

  <template id="tpl-skills">
    <div class="my-4 space-y-4 skills-container slide-in"></div>
  </template>

  <template id="tpl-blog-list">
    <div class="my-4 space-y-2 blog-container slide-in"></div>
  </template>

  <template id="tpl-post">
    <article class="my-6 p-6 border border-white/10 rounded bg-white/5 slide-in w-full max-w-4xl">
      <h1 class="text-2xl text-term-cyan font-bold mb-2 title-el"></h1>
      <div class="flex gap-2 mb-4 tags-el text-xs"></div>
      <div class="leading-relaxed text-slate-300 content-el text-sm sm:text-base mb-6 font-sans"></div>
      <button class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded font-mono text-xs transition-colors btn-back text-term-fg">
        [ ↩ Pressione para Voltar ao Índice ]
      </button>
    </article>
  </template>

  <template id="tpl-contact">
    <div class="grid grid-cols-[100px_1fr] gap-2 my-4 contact-container slide-in"></div>
  </template>

  <!-- SCRIPT BUNDLE (ESM, Reatividade, Lógica de Comandos) -->
  <script type="module" src="main.js"></script>
</body>
</html>
